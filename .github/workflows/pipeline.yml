name: PAYFLOW CI/CD PIPELINE

on:
  push:
    branches: [ "main" ]

jobs:

  code-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.10

      # 1. Security - Dependency Scan
      - name: Install Safety
        run: pip install safety

      - name: Run Security Check
        run: safety check

      # 2. Code Quality (Linting)
      - name: Install flake8
        run: pip install flake8

      - name: Run Linting
        run: flake8 .

  build:
    runs-on: ubuntu-latest
    needs: code-quality

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Simulate Build (Docker)
        run: |
          echo "Building PAYFLOW Application..."
          docker build -t payflow-app .

  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.10

      - name: Run Test Script
        run: python pipeline.py

  deploy-dev:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Deploy to Development
        run: echo "Deploying to DEV environment..."

  deploy-staging:
    runs-on: ubuntu-latest
    needs: deploy-dev

    steps:
      - name: Deploy to Staging
        run: echo "Deploying to STAGING environment..."

  deploy-prod:
    runs-on: ubuntu-latest
    needs: deploy-staging

    steps:
      - name: Production Approval Gate
        run: echo "Manual approval required before production"

      - name: Deploy to Production
        run: echo "Production Deployment Success"
